<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이든 고전어휘 | Eden Classic Vocab</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
:root{
  --hanji:#ece4d3; --hanji-2:#e3d8c0; --paper:#fffaf0; --paper-2:#fff8ec;
  --meok:#2a2620; --meok-soft:#5a5448;
  --red:#9e2b25; --blue:#2d5d6b; --gold:#b08930; --jade:#4a7a5c;
  --line:#c4b59a; --shadow:rgba(60,48,30,.12);
  --font:'Noto Sans KR','Malgun Gothic','맑은 고딕',-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--font);color:var(--meok);min-height:100vh;line-height:1.6;
  background:radial-gradient(circle at 18% 8%,rgba(176,137,48,.05),transparent 42%),
             radial-gradient(circle at 82% 92%,rgba(45,93,107,.05),transparent 42%),var(--hanji);
  background-attachment:fixed;}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.3;
  background-image:repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(120,100,70,.025) 3px,rgba(120,100,70,.025) 4px);}
.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:20px 20px 80px;}

#gate{position:fixed;inset:0;z-index:60;background:linear-gradient(160deg,#211d18,#2f2920);
  display:flex;align-items:center;justify-content:center;padding:24px;}
.gate-card{background:var(--hanji);border-radius:10px;padding:46px 34px;max-width:380px;width:100%;
  box-shadow:0 24px 60px rgba(0,0,0,.45);text-align:center;border-top:4px solid var(--red);}
.brand{font-weight:900;letter-spacing:.04em;font-size:13px;color:var(--red);margin-bottom:14px;}
.brand b{font-size:15px}
.gate-seal{width:64px;height:64px;margin:0 auto 16px;border-radius:50%;background:var(--red);color:#f3e9d0;
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:30px;
  box-shadow:0 4px 14px rgba(158,43,37,.4);}
.gate-card h1{font-size:21px;font-weight:900;margin-bottom:3px}
.gate-card .sub{font-size:13px;color:var(--meok-soft);margin-bottom:24px}
#gateName,#gateInput{width:100%;padding:13px 14px;font-size:16px;text-align:center;
  border:1.5px solid var(--line);border-radius:6px;background:#fff;color:var(--meok);font-family:var(--font);}
#gateName{margin-bottom:0}
#gateInput{letter-spacing:.3em;}
#gateInput:focus{outline:none;border-color:var(--red)}
.gate-btn{margin-top:14px;width:100%;padding:13px;border:none;border-radius:6px;cursor:pointer;
  background:var(--meok);color:var(--hanji);font-size:15px;font-weight:700;font-family:var(--font);transition:background .2s}
.gate-btn:hover{background:var(--red)}
.gate-err{color:var(--red);font-size:13px;margin-top:12px;min-height:18px;font-weight:500}

.app-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;padding-top:4px}
.app-head .logo{font-weight:900;font-size:15px;color:var(--red);letter-spacing:.02em}
.dir-toggle{display:flex;border:1px solid var(--line);border-radius:20px;overflow:hidden;font-size:12px}
.dir-toggle button{border:none;background:transparent;padding:6px 13px;cursor:pointer;font-family:var(--font);color:var(--meok-soft);font-weight:500}
.dir-toggle button.on{background:var(--blue);color:#fff}
header.hero{text-align:center;margin:14px 0 4px}
.eyebrow{font-size:12px;letter-spacing:.45em;color:var(--red);font-weight:700;margin-bottom:5px;padding-left:.45em}
header.hero h1{font-size:26px;font-weight:900}
header.hero .tag{font-size:13px;color:var(--meok-soft);margin-top:3px}

.progress-row{display:flex;align-items:center;gap:10px;margin:16px 0 20px;font-size:12px;color:var(--meok-soft)}
.progress-bar{flex:1;height:6px;background:var(--hanji-2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--red));transition:width .4s}

.mode-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(min-width:700px){.mode-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:460px){.mode-grid{grid-template-columns:1fr}}
/* 반응형 공통 */
@media(min-width:700px){
  .card{padding:34px 32px}
  .word-big{font-size:40px}
  .meaning-big{font-size:28px}
  .sentence{font-size:19px}
  .opt{font-size:17px;padding:16px 18px}
  .swipe-zone{height:380px}
  .flip-face{padding:36px 30px}
  .swipe-card .word-big{font-size:44px}
  .swipe-card .meaning-big{font-size:30px}
}
@media(max-width:480px){
  .word-big{font-size:26px}
  .meaning-big{font-size:19px}
  .sentence{font-size:15px;line-height:1.8}
  .opt{font-size:14px;padding:12px 13px}
  .topbar{flex-wrap:wrap;gap:6px}
}
.mode-card{background:var(--paper-2);border:1px solid var(--line);border-radius:10px;padding:18px 16px;cursor:pointer;
  text-align:left;transition:transform .15s,box-shadow .15s,border-color .15s;position:relative;overflow:hidden}
.mode-card::after{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent,var(--gold))}
.mode-card:hover{transform:translateY(-3px);box-shadow:0 10px 22px var(--shadow);border-color:var(--accent)}
.mode-card .ico{font-size:24px;font-weight:900;color:var(--accent);margin-bottom:6px}
.mode-card h3{font-size:16px;font-weight:800;margin-bottom:2px}
.mode-card p{font-size:12px;color:var(--meok-soft);line-height:1.45}
.mode-card .step{position:absolute;top:14px;right:14px;font-size:11px;font-weight:700;color:var(--meok-soft);
  border:1px solid var(--line);border-radius:10px;padding:1px 8px}

.screen{display:none;animation:fade .35s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.back-btn{background:none;border:1px solid var(--line);border-radius:20px;padding:6px 15px;font-size:13px;cursor:pointer;
  color:var(--meok-soft);font-family:var(--font);font-weight:500;transition:.15s}
.back-btn:hover{background:var(--hanji-2);color:var(--meok)}
.counter{font-size:13px;color:var(--meok-soft);font-weight:700}
.counter b{color:var(--red);font-size:16px}

.card{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:28px 24px;box-shadow:0 6px 18px var(--shadow)}
.src-tag{display:inline-block;font-size:11px;background:var(--hanji-2);color:var(--meok-soft);padding:3px 10px;border-radius:12px;margin-bottom:14px;font-weight:700}
.word-big{font-size:34px;font-weight:900;margin-bottom:6px;letter-spacing:-.01em}
.meaning-big{font-size:24px;font-weight:800;color:var(--blue)}
.sentence{font-size:17px;line-height:1.95;margin:6px 0 4px;padding:15px 16px;font-weight:500;
  background:var(--hanji);border-left:3px solid var(--gold);border-radius:0 6px 6px 0}
.sentence .blank{display:inline-block;min-width:80px;border-bottom:2.5px dashed var(--red);text-align:center;color:transparent}
.sentence .blank.filled{color:var(--red);font-weight:800;border-bottom-style:solid}
.context-note{font-size:13px;color:var(--meok-soft);margin-top:13px;line-height:1.7}

.options{display:grid;gap:9px;margin-top:20px}
.opt{background:#fff;border:1.5px solid var(--line);border-radius:8px;padding:14px 16px;font-size:16px;font-weight:600;
  font-family:var(--font);cursor:pointer;text-align:left;transition:.15s;color:var(--meok)}
.opt:hover:not(:disabled){border-color:var(--blue);background:#fbf6ea}
.opt.correct{background:#e8f1ea;border-color:var(--jade);color:var(--jade);font-weight:800}
.opt.wrong{background:#f6e7e6;border-color:var(--red);color:var(--red)}
.opt:disabled{cursor:default}

.type-input{width:100%;padding:14px 16px;font-size:20px;font-weight:700;text-align:center;
  border:1.5px solid var(--line);border-radius:8px;margin-top:18px;background:#fff;color:var(--meok);font-family:var(--font)}
.type-input:focus{outline:none;border-color:var(--blue)}
.type-input.ok{border-color:var(--jade);background:#e8f1ea;color:var(--jade)}
.type-input.no{border-color:var(--red);background:#f6e7e6;color:var(--red)}
.hint-row{font-size:13px;color:var(--meok-soft);text-align:center;margin-top:10px}

.action-btn{width:100%;padding:14px;margin-top:16px;border:none;border-radius:8px;cursor:pointer;
  background:var(--meok);color:var(--hanji);font-size:15px;font-weight:700;font-family:var(--font);transition:.2s}
.action-btn:hover{background:var(--red)}
.action-btn.ghost{background:transparent;color:var(--meok-soft);border:1px solid var(--line)}
.action-btn.ghost:hover{background:var(--hanji-2);color:var(--meok)}

.feedback{text-align:center;font-size:15px;margin-top:14px;min-height:24px;font-weight:700}
.feedback.right{color:var(--jade)}
.feedback.wrongf{color:var(--red)}

/* ---- 정답/오답 시각 피드백 (큰 배지 + 화면 테두리 플래시) ---- */
.judge-badge{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.4);z-index:40;
  width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:64px;font-weight:900;color:#fff;opacity:0;pointer-events:none;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),opacity .25s;
}
.judge-badge.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.judge-badge.ok{background:var(--jade);box-shadow:0 0 0 10px rgba(74,122,92,.18)}
.judge-badge.no{background:var(--red);box-shadow:0 0 0 10px rgba(158,43,37,.18)}
.flash-border{position:fixed;inset:0;z-index:35;pointer-events:none;opacity:0;transition:opacity .15s}
.flash-border.ok{box-shadow:inset 0 0 0 8px var(--jade);opacity:1}
.flash-border.no{box-shadow:inset 0 0 0 8px var(--red);opacity:1}

/* ---- 플래시카드: 스와이프 + 3D 뒤집기 ---- */
.swipe-zone{position:relative;height:300px;margin-bottom:6px;perspective:1400px}
.swipe-card{
  position:absolute;inset:0;cursor:grab;touch-action:none;will-change:transform;
}
.swipe-card:active{cursor:grabbing}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .5s cubic-bezier(.4,.2,.2,1);
  transform-style:preserve-3d;}
.swipe-card.flipped .flip-inner{transform:rotateY(180deg)}
.flip-face{position:absolute;inset:0;backface-visibility:hidden;background:var(--paper);border:1.5px solid var(--line);
  border-radius:16px;box-shadow:0 10px 28px var(--shadow);padding:30px 26px;display:flex;flex-direction:column;
  justify-content:center;align-items:center;text-align:center;}
.flip-face.back{transform:rotateY(180deg);background:#f6f0e0}
.swipe-card .word-big{font-size:36px}
.swipe-card .meaning-big{font-size:25px}
.flip-face .tap-mark{position:absolute;bottom:14px;right:16px;font-size:11px;color:var(--meok-soft);
  display:flex;align-items:center;gap:4px}
.swipe-flag{position:absolute;top:18px;font-weight:900;font-size:18px;padding:5px 14px;border-radius:8px;
  opacity:0;transition:opacity .08s;pointer-events:none;border:2.5px solid;z-index:5;background:#fff}
.swipe-flag.left{left:18px;color:var(--red);border-color:var(--red);transform:rotate(-10deg)}
.swipe-flag.right{right:18px;color:var(--jade);border-color:var(--jade);transform:rotate(10deg)}
.swipe-flag.up{left:50%;top:14px;transform:translateX(-50%);color:var(--gold);border-color:var(--gold)}
.swipe-hint{text-align:center;font-size:11px;color:var(--meok-soft);margin-top:8px}
.swipe-stats{display:flex;gap:8px;margin-top:14px;font-size:12px}
.swipe-stats .box{flex:1;text-align:center;border-radius:8px;padding:9px 4px;font-weight:700}
.swipe-stats .s-left{background:#f6e7e6;color:var(--red)}
.swipe-stats .s-up{background:#f7eedb;color:var(--gold)}
.swipe-stats .s-right{background:#e8f1ea;color:var(--jade)}
.swipe-stats .box b{display:block;font-size:18px}
.swipe-btns{display:flex;gap:8px;margin-top:14px}
.swipe-btns button{flex:1;padding:13px 6px;border:1.5px solid var(--line);border-radius:9px;background:#fff;
  cursor:pointer;font-family:var(--font);font-size:13px;font-weight:700;transition:.15s}
.swipe-btns .bL{color:var(--red)} .swipe-btns .bL:hover{background:#f6e7e6;border-color:var(--red)}
.swipe-btns .bU{color:var(--gold)} .swipe-btns .bU:hover{background:#f7eedb;border-color:var(--gold)}
.swipe-btns .bR{color:var(--jade)} .swipe-btns .bR:hover{background:#e8f1ea;border-color:var(--jade)}

.leitner-stats{display:flex;gap:8px;margin-bottom:14px;font-size:12px}
.leitner-stats .box{flex:1;text-align:center;background:var(--paper-2);border:1px solid var(--line);border-radius:8px;padding:8px 4px}
.leitner-stats .box b{display:block;font-size:18px;font-weight:900}
.leitner-stats .b-round b{color:var(--gold)}
.leitner-stats .b-queue b{color:var(--blue)}
.leitner-stats .b-done b{color:var(--jade)}

/* ---- 타임어택: 좌→우 채움 / 우→좌 소진 바 ---- */
.time-bar-wrap{height:14px;background:var(--hanji-2);border-radius:7px;overflow:hidden;margin-bottom:18px;border:1px solid var(--line)}
.time-bar{height:100%;width:100%;background:linear-gradient(90deg,var(--gold),var(--red));
  transform-origin:right center;transition:transform linear;}
.time-num{text-align:center;font-size:13px;color:var(--meok-soft);margin-bottom:6px;font-weight:700}

/* ---- 카드 맞추기: 세련된 다크 네이비 카드 ---- */
.match-board{background:linear-gradient(165deg,#1a2433,#0f1620);border-radius:16px;padding:20px;
  box-shadow:0 14px 36px rgba(0,0,0,.35)}
@media(min-width:700px){.match-board{padding:28px}.match-tile{min-height:120px;font-size:18px}}
.match-round-note{font-size:12px;color:#9fb3c8;text-align:center;margin-bottom:14px;font-weight:600}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:0}
.match-tile{
  background:linear-gradient(160deg,#1f3550,#162538);border:1.5px solid #2c4a63;
  border-radius:11px;padding:20px 10px;font-size:15px;font-weight:700;color:#eef3f8;
  cursor:pointer;text-align:center;transition:.18s;min-height:100px;display:flex;align-items:center;
  justify-content:center;line-height:1.4;box-shadow:0 4px 14px rgba(0,0,0,.3);font-size:16px;
}
.match-tile:hover:not(.done){transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.4);border-color:#3d6286}
.match-tile.sel{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold),0 8px 22px rgba(176,137,48,.3);
  background:linear-gradient(160deg,#28415f,#1c3047)}
.match-tile.done{opacity:.16;cursor:default;border-style:dashed;transform:scale(.94)}
.match-tile.flash-wrong{animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

.result-card{text-align:center;padding:38px 24px}

/* ---- 블래스트 게임 ---- */
.blast-board{position:relative;height:calc(100svh - 160px);min-height:420px;max-height:700px;border-radius:16px;overflow:hidden;
  background:radial-gradient(ellipse at 50% 0%,#1a2c45,#070b14 70%);box-shadow:0 14px 36px rgba(0,0,0,.4)}
@media(max-width:480px){.blast-board{height:calc(100svh - 140px);min-height:360px}}
.blast-stars{position:absolute;inset:0;background-image:
  radial-gradient(1.5px 1.5px at 20% 30%,#fff,transparent),
  radial-gradient(1.5px 1.5px at 70% 20%,#fff,transparent),
  radial-gradient(1px 1px at 40% 70%,#fff,transparent),
  radial-gradient(1.5px 1.5px at 85% 60%,#fff,transparent),
  radial-gradient(1px 1px at 10% 80%,#fff,transparent),
  radial-gradient(1.5px 1.5px at 60% 90%,#fff,transparent);
  opacity:.5}
.blast-hud{position:absolute;top:0;left:0;right:0;z-index:7;display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;font-size:14px;color:#dce6f2;font-weight:700;background:linear-gradient(to bottom,rgba(7,11,20,.85),transparent)}
.blast-hud .score{color:var(--gold);font-size:16px}
.blast-hud .time{color:#ff7a6e}
.blast-target{position:absolute;top:52px;left:50%;transform:translateX(-50%);z-index:6;
  background:#0e1726;border:2px solid var(--gold);color:#fff;font-weight:800;font-size:20px;
  padding:10px 24px;border-radius:10px;box-shadow:0 0 18px rgba(176,137,48,.4);white-space:nowrap}
@media(min-width:700px){.blast-target{font-size:24px;padding:12px 30px}}
.blast-bubble{
  position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 35% 30%,#3a5a8a,#16243a 75%);border:1.5px solid #4a6fa0;
  color:#eaf1fa;font-weight:700;font-size:13px;cursor:pointer;text-align:center;padding:8px;
  box-shadow:0 0 14px rgba(60,100,170,.35);transition:transform .12s,box-shadow .12s;
  line-height:1.25;word-break:keep-all;
}
@media(min-width:700px){.blast-bubble{font-size:15px}}
.blast-bubble:hover{transform:scale(1.06)}
.blast-bubble.pop{animation:pop .35s forwards}
@keyframes pop{to{transform:scale(1.6);opacity:0}}
.blast-bubble.miss{animation:missflash .35s}
@keyframes missflash{0%,100%{box-shadow:0 0 14px rgba(60,100,170,.35)}50%{box-shadow:0 0 22px rgba(158,43,37,.9);border-color:var(--red)}}
.blast-start{text-align:center;padding:50px 24px}
.blast-start h3{font-size:20px;font-weight:900;margin-bottom:8px}
.blast-start p{font-size:13px;color:var(--meok-soft);margin-bottom:20px;line-height:1.7}
.result-score{font-size:52px;font-weight:900;color:var(--red);line-height:1}
.result-label{font-size:14px;color:var(--meok-soft);margin:8px 0 18px;font-weight:600}
.result-msg{font-size:17px;font-weight:800;margin-bottom:14px}
.wrong-list{text-align:left;background:var(--hanji);border-radius:8px;padding:14px 16px;margin:16px 0;max-height:220px;overflow:auto}
.wrong-list h4{font-size:13px;color:var(--red);margin-bottom:8px;font-weight:800}
.wrong-list .wi{font-size:13px;padding:5px 0;border-bottom:1px solid var(--line);font-weight:500}
.wrong-list .wi:last-child{border:none}
.wrong-list .wi b{font-weight:800;color:var(--meok)}


/* ── 하단 탭바 ── */
.bottom-tab{position:fixed;bottom:0;left:0;right:0;z-index:20;
  display:flex;background:#fff;border-top:1px solid var(--line);
  box-shadow:0 -4px 16px rgba(0,0,0,.08)}
.bottom-tab button{flex:1;border:none;background:none;padding:10px 4px 8px;
  font-family:var(--font);font-size:11px;font-weight:700;color:var(--meok-soft);
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:.15s}
.bottom-tab button .ti{font-size:20px;line-height:1}
.bottom-tab button.on{color:var(--red)}
.bottom-tab button.on .ti{filter:drop-shadow(0 0 4px rgba(158,43,37,.4))}
/* wrap 하단 패딩 늘림 (탭바 공간) */
.wrap{padding-bottom:90px!important}

/* ── 학습기록 화면 ── */
.rec-screen{display:none;animation:fade .3s ease}
.rec-screen.active{display:block}
.rec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.rec-header h2{font-size:18px;font-weight:900}
.rec-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.rec-tab{border:1.5px solid var(--line);background:#fff;border-radius:20px;
  padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;color:var(--meok-soft);font-family:var(--font)}
.rec-tab.on{background:var(--red);color:#fff;border-color:var(--red)}
.rec-empty{text-align:center;padding:50px 20px;color:var(--meok-soft);font-size:14px}
.rec-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
@media(min-width:600px){.rec-summary{grid-template-columns:repeat(5,1fr)}}
.rec-stat{background:var(--paper-2);border:1px solid var(--line);border-radius:10px;
  padding:12px 8px;text-align:center}
.rec-stat b{display:block;font-size:22px;font-weight:900;color:var(--red)}
.rec-stat span{font-size:11px;color:var(--meok-soft)}
.rec-list{display:flex;flex-direction:column;gap:8px;max-height:calc(100svh - 320px);overflow-y:auto}
.rec-item{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:14px 16px;
  display:grid;grid-template-columns:1fr auto;gap:4px 12px;align-items:start}
.rec-item .ri-top{font-size:13px;font-weight:800}
.rec-item .ri-sub{font-size:12px;color:var(--meok-soft);grid-column:1/-1}
.rec-item .ri-score{font-size:20px;font-weight:900;color:var(--jade);text-align:right}
.rec-item .ri-score.bad{color:var(--red)}
.rec-item .ri-wrongs{grid-column:1/-1;font-size:11px;color:var(--red);margin-top:4px;
  background:#fff0f0;border-radius:6px;padding:5px 8px;line-height:1.6}
.rec-clear{background:none;border:1px solid var(--line);border-radius:7px;padding:8px 16px;
  font-size:12px;font-weight:700;color:var(--meok-soft);cursor:pointer;font-family:var(--font)}
.rec-clear:hover{background:#f6e7e6;color:var(--red);border-color:var(--red)}

footer{text-align:center;margin-top:36px;font-size:12px;color:var(--meok-soft)}
footer .stamp{display:inline-block;border:1px solid var(--red);color:var(--red);font-weight:800;
  padding:3px 12px;border-radius:3px;letter-spacing:.1em;font-size:11px}
</style>
</head>
<body>

<div class="flash-border" id="flashBorder"></div>
<div class="judge-badge" id="judgeBadge"></div>

<div id="gate">
  <div class="gate-card">
    <div class="brand"><b>EDEN X</b> · 고전어휘</div>
    <div class="gate-seal">古</div>
    <h1>이든 고전어휘</h1>
    <div class="sub">수능 고전문학 핵심어 150選</div>
    <input id="gateName" type="text" placeholder="이름" maxlength="20" autocomplete="off" style="margin-bottom:10px">
    <input id="gateInput" type="password" placeholder="비밀번호" maxlength="20" autocomplete="off">
    <button class="gate-btn" onclick="checkGate()">로그인</button>
    <div class="gate-err" id="gateErr"></div>
  </div>
</div>

<div class="wrap" id="app" style="display:none">
  <div class="app-head">
    <span class="logo">EDEN X 고전어휘</span>
    <span id="userTag" style="font-size:12px;color:var(--meok-soft);font-weight:700"></span>
    <div class="dir-toggle" id="dirToggle">
      <button class="on" data-dir="w2m" onclick="setDir('w2m')">어휘 먼저</button>
      <button data-dir="m2w" onclick="setDir('m2w')">뜻 먼저</button>
    </div>
  </div>

  <header class="hero">
    <div class="eyebrow" id="eyebrow">고전문학</div>
    <h1 id="mainTitle">고전어휘 인출 연습</h1>
    <div class="tag">맥락 속에서 익히고, 인출로 새긴다</div>
  </header>

  <div class="progress-row">
    <span id="progLabel">학습 어휘</span>
    <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
    <span id="progNum">0 / 0</span>
  </div>

  <div class="screen active" id="subjectSel">
    <div class="mode-grid">
      <button class="mode-card" style="--accent:var(--red)" onclick="selectSubject('classic')">
        <div class="ico">古</div><h3>고전문학</h3><p>150개 어휘 · 시/산문</p>
      </button>
      <button class="mode-card" style="--accent:var(--blue)" onclick="selectSubject('science')">
        <div class="ico">科</div><h3>독서 · 과학/기술</h3><p>148개 어휘</p>
      </button>
      <button class="mode-card" style="--accent:var(--jade)" onclick="selectSubject('society')">
        <div class="ico">社</div><h3>독서 · 사회/문화</h3><p>131개 어휘</p>
      </button>
      <button class="mode-card" style="--accent:var(--gold)" onclick="selectSubject('humanities')">
        <div class="ico">藝</div><h3>독서 · 인문/예술</h3><p>150개 어휘</p>
      </button>
    </div>
  </div>

  <div class="screen" id="unitSel">
    <div class="topbar">
      <button class="back-btn" onclick="goSubjects()">← 과목 선택</button>
      <span class="counter" id="unitSubjLabel"></span>
    </div>
    <div class="mode-grid" id="unitGrid"></div>
  </div>

  <div class="screen" id="home">
    <div class="topbar">
      <button class="back-btn" onclick="goUnits()">← 단원 선택</button>
      <span class="counter" id="subjLabel"></span>
    </div>
    <div class="mode-grid">
      <button class="mode-card" style="--accent:var(--gold)" onclick="startMode('flash')">
        <span class="step">1차</span>
        <div class="ico">①</div><h3>플래시카드</h3><p>스와이프로 전체 어휘 분류 학습</p>
      </button>
      <button class="mode-card" style="--accent:var(--blue)" onclick="startMode('leitner')">
        <span class="step">2차</span>
        <div class="ico">②</div><h3>라이트너 3회독</h3><p>모르는 것만 골라 반복 인출</p>
      </button>
      <button class="mode-card" style="--accent:var(--red)" onclick="startMode('time')">
        <span class="step">3차</span>
        <div class="ico">③</div><h3>타임어택</h3><p>전체 어휘 제한시간 최종 점검</p>
      </button>
      <button class="mode-card" style="--accent:var(--blue)" onclick="startMode('blank')">
        <div class="ico">④</div><h3>문맥 빈칸</h3><p>원문 빈칸에 들어갈 어휘 고르기</p>
      </button>
      <button class="mode-card" style="--accent:var(--jade)" onclick="startMode('mc')">
        <div class="ico">⑤</div><h3>4지선다</h3><p>어휘·뜻 객관식으로 가려내기</p>
      </button>
      <button class="mode-card" style="--accent:var(--red)" onclick="startMode('write')">
        <div class="ico">⑥</div><h3>단어 쓰기</h3><p>뜻을 보고 어휘를 직접 입력</p>
      </button>
      <button class="mode-card" style="--accent:var(--blue)" onclick="startMode('match')">
        <div class="ico">⑦</div><h3>카드 맞추기</h3><p>큰 카드로 어휘·뜻 짝 맞추기</p>
      </button>
      <button class="mode-card" style="--accent:var(--gold)" onclick="startMode('blast')">
        <div class="ico">🚀</div><h3>블래스트</h3><p>떠다니는 소행성에서 정답 격파</p>
      </button>
    </div>
  </div>

  <div class="screen" id="game">
    <div class="topbar">
      <button class="back-btn" onclick="goHome()">← 모드 선택</button>
      <span class="counter" id="counter"></span>
    </div>
    <div id="gameBody"></div>
    <div class="feedback" id="feedback"></div>
  </div>


  <!-- 학습기록 화면 -->
  <div class="rec-screen" id="recScreen">
    <div class="rec-header">
      <h2>📊 학습기록</h2>
      <button class="rec-clear" onclick="clearRecords()">기록 초기화</button>
    </div>
    <div id="recSummary" class="rec-summary"></div>
    <div class="rec-tabs" id="recTabs"></div>
    <div id="recList" class="rec-list"></div>
  </div>

  <!-- 하단 탭바 -->
  <nav class="bottom-tab" id="bottomTab">
    <button class="on" id="tabStudy" onclick="switchTab('study')">
      <span class="ti">📖</span>학습
    </button>
    <button id="tabRecord" onclick="switchTab('record')">
      <span class="ti">📊</span>학습기록
    </button>
  </nav>

  <footer>
    <span class="stamp">EDEN 古典語彙</span>
    <div style="margin-top:8px">이든관리형학습센터 · 인출학습 기반 어휘 마스터</div>
  </footer>
</div>

<script>
/* ============================================================
/* ============================================================
   데이터 — 4과목 전체 (고전문학/과학기술/사회문화/인문예술)
   ============================================================ */

function selectSubject(key){
  SUBJECT = key;
  FULL_VOCAB = DATA[key];
  const meta = SUBJECT_META[key];
  $('eyebrow').textContent = meta.eyebrow;
  $('mainTitle').textContent = meta.title;
  $('unitSubjLabel').textContent = meta.label + ' · 전체 ' + FULL_VOCAB.length + '개';
  renderUnitGrid();

function renderUnitGrid(){
  const total = FULL_VOCAB.length;
  const unitCount = Math.ceil(total/UNIT_SIZE);
  const accents=['var(--red)','var(--blue)','var(--jade)','var(--gold)'];
  let html='';
  for(let i=0;i<unitCount;i++){
    const start=i*UNIT_SIZE+1;
    const end=Math.min(total,(i+1)*UNIT_SIZE);
    html += `<button class="mode-card" style="--accent:${accents[i%4]}" onclick="selectUnit(${i})">
      <div class="ico">${i+1}</div><h3>${i+1}단원</h3><p>${start}~${end}번 (${end-start+1}개)</p>
    </button>`;
  }
  $('unitGrid').innerHTML = html;
}
function selectUnit(i){
  UNIT_IDX = i;
  VOCAB = FULL_VOCAB.slice(i*UNIT_SIZE, i*UNIT_SIZE+UNIT_SIZE);
  const meta = SUBJECT_META[SUBJECT];
  $('subjLabel').textContent = meta.label + ' · ' + (i+1) + '단원 (' + VOCAB.length + '개)';
  showScreen('home');
  setProgress(0,0,'학습 어휘');
}

/* 학습 완료 시 호출 — ① localStorage 즉시 저장, ② Apps Script 전송(설정 시) */
function saveStudyRecord({scoreVal, totalVal, wrongWords=[], extraNote=''}){
  if(!currentUser) return;
  const elapsed = Math.round((Date.now() - sessionStart) / 1000);
  const key = recordKey();
  attemptCount[key] = (attemptCount[key]||0) + 1;

  const payload = {
    name:    currentUser,
    subject: SUBJECT_META[SUBJECT]?.label || SUBJECT,
    unit:    `${UNIT_IDX+1}단원`,
    mode:    modeLabel() + (extraNote ? ` (${extraNote})` : ''),
    score:   scoreVal,
    total:   totalVal,
    elapsed: elapsed,
    attempt: attemptCount[key],
    wrongs:  wrongWords.map(w => typeof w==='object' ? w.word : w),
    time:    new Date().toLocaleString('ko-KR')
  };

  /* ① 기기 내 즉시 저장 */
  saveLocalRecord(payload);

  /* ② Apps Script 연동 (URL 설정 시) */
  if(APPS_SCRIPT_URL && !APPS_SCRIPT_URL.startsWith('YOUR_')){
    fetch(APPS_SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    }).catch(err => console.warn('[이든] 시트 전송 실패:', err));
  }
}

   시트에 행을 추가하면 새로고침 시 자동 반영됩니다.

const SHEET_ID = "1VkaajcU_EnvvLPbdTuzQHhtsHl0xdc8_G04HIzm_Ikg";
const SHEET_NAME = "sheet1";   // 학생 이름·비번 탭 (소문자)
const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;

// ※ 평소에는 sheet1에서 실시간으로 불러오므로 이 값은 사용되지 않습니다.

  {name:"최수정",  pw:"517400"},{name:"황혜암",    pw:"281700"}
];
let studentsLoaded = false;

function parseStudentCSV(text){
  const lines = text.replace(/\r/g,'').split('\n').filter(l=>l.trim().length>0);
  const out=[];
  for(let i=1;i<lines.length;i++){ // 첫 줄은 헤더(이름,비번)
    const cols = lines[i].split(',').map(c=>c.replace(/^"|"$/g,'').trim());
    const name = cols[0], pw = String(cols[1]||'').padStart(6,'0');
    if(name && pw) out.push({name, pw});
  }
  return out;
}

async function loadStudentsFromSheet(){
  try{
    const res = await fetch(SHEET_CSV_URL, {cache:"no-store"});
    if(!res.ok) throw new Error('fetch failed');
    const text = await res.text();
    const parsed = parseStudentCSV(text);
    if(parsed.length>0){ STUDENTS = parsed; }
    studentsLoaded = true;
  }catch(e){
    studentsLoaded = true; // 실패해도 예비 명단으로 로그인 가능하도록 진행
    console.warn('학생 명단 시트를 불러오지 못해 예비 명단을 사용합니다.', e);
  }
}
loadStudentsFromSheet();

let currentUser='';
function checkGate(){
  if(!studentsLoaded){
    $('gateErr').textContent='명단을 불러오는 중입니다. 잠시 후 다시 시도해 주세요.';
    setTimeout(checkGate, 700);
    return;
  }
  if(STUDENTS.length === 0){
    $('gateErr').textContent='⚠ 학생 명단을 불러오지 못했습니다. Sheet1 공유 설정(링크 보기)을 확인해 주세요.';
    return;
  }
  const n=$('gateName').value.trim();
  const v=$('gateInput').value.trim();
  const found=STUDENTS.find(s=>s.name===n && s.pw===v);
  if(found){
    currentUser=found.name;
    $('gate').style.display='none';$('app').style.display='block';
    $('userTag').textContent=currentUser+'님';
  }else{
    $('gateErr').textContent='이름 또는 비밀번호가 올바르지 않습니다. 이름 정확하게, 비번은 6자리 숫자로 입력하세요.';
    $('gateInput').value='';
  }
}
$('gateInput').addEventListener('keydown',e=>{if(e.key==='Enter')checkGate()});
$('gateName').addEventListener('keydown',e=>{if(e.key==='Enter')$('gateInput').focus()});

function setDir(d){
  dir=d;
  document.querySelectorAll('#dirToggle button').forEach(b=>b.classList.toggle('on',b.dataset.dir===d));
  // 블래스트 진행 중이면 즉시 다음 배치에 반영 (현재 배치 새로고침)
  if(mode==='blast' && blast.target){
    const board=$('blastBoard');
    if(board){ spawnBatch(); }
  }
}

function setProgress(cur,total,label){
  $('progLabel').textContent=label;$('progNum').textContent=`${cur} / ${total}`;
  $('progFill').style.width=total?(cur/total*100)+'%':'0';
}
function goHome(){clearTimer();showScreen('home');
  $('feedback').textContent='';setProgress(0,0,'학습 어휘');}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');}
function modeLabel(){return{flash:'플래시카드',leitner:'라이트너 3회독',time:'타임어택',blank:'문맥 빈칸',mc:'4지선다',write:'단어 쓰기',match:'카드 맞추기',blast:'블래스트'}[mode];}

function startMode(m){
  mode=m;idx=0;score=0;answered=false;wrongs=[];
  sessionStart = Date.now();   // ← 학습 시작 시각 기록
  showScreen('game');$('feedback').textContent='';
  if(m==='match'){startMatch();return;}
  if(m==='blast'){startBlastIntro();return;}
  if(m==='leitner'){startLeitner();return;}
  if(m==='time'){queue=shuffle(VOCAB);startTime();return;}
  if(m==='flash'){startFlash();return;}
  queue=shuffle(VOCAB);renderQ();
}

function distractors(correct,key,count=3){
  const pool=shuffle(VOCAB.filter(v=>v[key]!==correct[key])).slice(0,count).map(v=>v[key]);
  return shuffle([correct[key],...pool]);
}

function renderQ(){
  if(idx>=queue.length)return renderResult();
  setProgress(idx,queue.length,modeLabel());
  $('counter').innerHTML=`<b>${idx+1}</b> / ${queue.length}`;
  $('feedback').textContent='';answered=false;
  const q=queue[idx];
  if(mode==='blank')renderBlank(q);
  if(mode==='mc')renderMC(q);
  if(mode==='write')renderWrite(q);
}

/* ============================================================
   ① 플래시카드 — 스와이프 (좌:모름 / 우:알아 / 위:애매)
   ============================================================ */
let fs={left:0,up:0,right:0};
function startFlash(){
  queue=shuffle(VOCAB);idx=0;fs={left:0,up:0,right:0};
  renderFlashCard();
}
function renderFlashCard(){
  if(idx>=queue.length)return flashResult();
  setProgress(idx,queue.length,'플래시카드');
  $('counter').innerHTML=`<b>${idx+1}</b> / ${queue.length}`;
  const q=queue[idx];
  const front=dir==='w2m'?q.word:q.meaning;
  const back=dir==='w2m'?q.meaning:q.word;
  $('gameBody').innerHTML=`
    <div class="swipe-zone">
      <div class="swipe-card" id="swCard">
        <div class="swipe-flag left">✗ 모름</div>
        <div class="swipe-flag up">△ 애매</div>
        <div class="swipe-flag right">✓ 알아!</div>
        <div class="flip-inner" id="flipInner">
          <div class="flip-face front">
            <span class="src-tag">${q.source}</span>
            <div class="${dir==='w2m'?'word-big':'meaning-big'}">${front}</div>
            <span class="tap-mark">👆 눌러서 뒤집기</span>
          </div>
          <div class="flip-face back">
            <div class="${dir==='w2m'?'meaning-big':'word-big'}">${back}</div>
            <div class="sentence" style="margin-top:14px">${q.sentence}</div>
            <div class="context-note">${q.context}</div>
          </div>
        </div>
      </div>
    </div>
    <div class="swipe-hint">카드를 눌러 뜻 확인 · 좌우/위로 끌어서 분류하세요</div>
    <div class="swipe-btns">
      <button class="bL" onclick="flashJudge('left')">← 모름</button>
      <button class="bU" onclick="flashJudge('up')">△ 애매(1~3초)</button>
      <button class="bR" onclick="flashJudge('right')">알아! →</button>
    </div>
    <div class="swipe-stats">
      <div class="box s-left">모름<b>${fs.left}</b></div>
      <div class="box s-up">애매<b>${fs.up}</b></div>
      <div class="box s-right">알아요<b>${fs.right}</b></div>
    </div>`;
  bindSwipe();
}
function bindSwipe(){
  const card=$('swCard');let sx=0,sy=0,dx=0,dy=0,dragging=false,moved=false;
  const onDown=e=>{dragging=true;moved=false;const p=e.touches?e.touches[0]:e;sx=p.clientX;sy=p.clientY;card.style.transition='none';};
  const onMove=e=>{
    if(!dragging)return;const p=e.touches?e.touches[0]:e;dx=p.clientX-sx;dy=p.clientY-sy;
    if(Math.abs(dx)>5||Math.abs(dy)>5)moved=true;
    card.style.transform=`translate(${dx}px,${dy}px) rotate(${dx/16}deg)`;
    const lf=card.querySelector('.left'),rf=card.querySelector('.right'),uf=card.querySelector('.up');
    lf.style.opacity=dx<-15?Math.min(1,-dx/60):0;
    rf.style.opacity=dx>15?Math.min(1,dx/60):0;
    uf.style.opacity=(dy<-15&&Math.abs(dx)<70)?Math.min(1,-dy/60):0;
  };
  const onUp=()=>{
    if(!dragging)return;dragging=false;card.style.transition='transform .35s cubic-bezier(.34,1.2,.4,1)';
    if(!moved){card.style.transform='';card.classList.toggle('flipped');playFlipSound();return;}
    if(dy<-45&&Math.abs(dx)<60){flyOut('up');return;}
    if(dx<-55){flyOut('left');return;}
    if(dx>55){flyOut('right');return;}
    card.style.transform='';
    card.querySelectorAll('.swipe-flag').forEach(f=>f.style.opacity=0);
  };
  card.addEventListener('pointerdown',onDown);
  card.addEventListener('pointermove',onMove);
  card.addEventListener('pointerup',onUp);
  card.addEventListener('pointerleave',()=>{if(dragging&&!moved)onUp();});
}
function flyOut(dir2){
  const card=$('swCard');
  const tx=dir2==='left'?-700:dir2==='right'?700:0;
  const ty=dir2==='up'?-700:0;
  card.style.transition='transform .3s cubic-bezier(.4,0,.6,1)';
  card.style.transform=`translate(${tx}px,${ty}px) rotate(${tx/10}deg)`;
  card.style.opacity='0';
  setTimeout(()=>flashJudge(dir2),240);
}
function flashJudge(dir2){
  if(dir2==='left')fs.left++;if(dir2==='up')fs.up++;if(dir2==='right')fs.right++;
  idx++;renderFlashCard();
}
function flashResult(){
  setProgress(queue.length,queue.length,'플래시카드');
  $('counter').innerHTML='';$('feedback').textContent='';

  // ★ 학습기록 전송 (플래시카드는 정답/오답 없이 분류 결과 기록)
  saveStudyRecord({
    scoreVal: fs.right,
    totalVal: queue.length,
    wrongWords: [],
    extraNote: `알아요${fs.right}/애매${fs.up}/모름${fs.left}`
  });
  $('gameBody').innerHTML=`
    <div class="card result-card">
      <div class="result-score">${fs.right}<span style="font-size:24px;color:var(--meok-soft)"> / ${queue.length}</span></div>
      <div class="result-label">바로 안다고 표시한 어휘</div>
      <div class="result-msg">모름 ${fs.left} · 애매 ${fs.up} · 알아요 ${fs.right}</div>
      <div class="context-note">모름·애매로 분류된 어휘는 다음 단계인 라이트너 3회독에서 집중적으로 다시 만나게 됩니다.</div>
      <button class="action-btn" onclick="startMode('flash')">다시 도전</button>
      <button class="action-btn ghost" onclick="goHome()">모드 선택으로</button>
    </div>`;
}

/* ============================================================
   ④ 문맥 빈칸
   ============================================================ */
function renderBlank(q){
  const blanked=q.sentence.replace(q.blankTarget,`<span class="blank" id="bk">＿＿＿</span>`);
  const opts=distractors(q,'word');
  $('gameBody').innerHTML=`
    <div class="card">
      <span class="src-tag">${q.source}</span>
      <div class="sentence">${blanked}</div>
      <div class="context-note">빈칸에 들어갈 알맞은 어휘를 고르세요.</div>
      <div class="options" id="opts">
        ${opts.map(o=>`<button class="opt" onclick="ansBlank(this,'${esc(o)}','${esc(q.word)}','${esc(q.blankTarget)}')">${o}</button>`).join('')}
      </div>
    </div>`;
}
function ansBlank(btn,chosen,correct,target){
  if(answered)return;answered=true;
  const right=chosen===correct;
  document.querySelectorAll('#opts .opt').forEach(b=>{b.disabled=true;
    if(b.textContent===correct)b.classList.add('correct');else if(b===btn)b.classList.add('wrong');});
  const bk=$('bk');bk.textContent=target;bk.classList.add('filled');
  feedback(right);if(right)score++;else wrongs.push(queue[idx]);
  setTimeout(next,right?900:1700);
}

/* ============================================================
   ⑤ 4지선다
   ============================================================ */
function renderMC(q){
  const qFace=dir==='w2m'?q.word:q.meaning;
  const key=dir==='w2m'?'meaning':'word';
  const ask=dir==='w2m'?'이 어휘의 뜻으로 알맞은 것은?':'이 뜻에 해당하는 어휘는?';
  const opts=distractors(q,key);
  $('gameBody').innerHTML=`
    <div class="card">
      <span class="src-tag">${q.source}</span>
      <div class="${dir==='w2m'?'word-big':'meaning-big'}" style="text-align:center">${qFace}</div>
      <div class="context-note" style="text-align:center">${ask}</div>
      <div class="options" id="opts">
        ${opts.map(o=>`<button class="opt" onclick="ansMC(this,'${esc(o)}','${esc(q[key])}')">${o}</button>`).join('')}
      </div>
    </div>`;
}
function ansMC(btn,chosen,correct){
  if(answered)return;answered=true;
  const right=chosen===correct;
  document.querySelectorAll('#opts .opt').forEach(b=>{b.disabled=true;
    if(b.textContent===correct)b.classList.add('correct');else if(b===btn)b.classList.add('wrong');});
  feedback(right);if(right)score++;else wrongs.push(queue[idx]);
  setTimeout(next,right?900:1600);
}

/* ============================================================
   ⑥ 단어 쓰기
   ============================================================ */
function renderWrite(q){
  $('gameBody').innerHTML=`
    <div class="card">
      <span class="src-tag">${q.source}</span>
      <div class="meaning-big" style="text-align:center">${q.meaning}</div>
      <div class="context-note" style="text-align:center">이 뜻을 가진 어휘를 입력하세요 (한자 생략 가능)</div>
      <input class="type-input" id="writeIn" placeholder="어휘 입력" autocomplete="off">
      <div class="hint-row" id="hintRow"></div>
      <button class="action-btn" id="writeBtn" onclick="ansWrite()">확인</button>
    </div>`;
  const inp=$('writeIn');inp.focus();
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')ansWrite()});
}
function normalize(s){return s.replace(/\(.*?\)/g,'').replace(/\s/g,'').toLowerCase();}
function ansWrite(){
  if(answered)return;
  const q=queue[idx];const inp=$('writeIn');const user=normalize(inp.value);
  if(!user)return;answered=true;
  const right=user===normalize(q.word);
  inp.disabled=true;inp.classList.add(right?'ok':'no');$('writeBtn').style.display='none';
  if(!right)$('hintRow').innerHTML=`정답: <b style="color:var(--red)">${q.word}</b>`;
  feedback(right);if(right)score++;else wrongs.push(q);
  setTimeout(next,right?1000:2000);
}

/* ============================================================
   ② 라이트너 3회독 — 전체 어휘, 모르는 것만 반복
   ============================================================ */
let lt={round:1,cur:[],know:[],dontknow:[],total:0};
function startLeitner(){
  lt={round:1,cur:shuffle(VOCAB),know:[],dontknow:[],total:VOCAB.length};
  renderLeitner();
}
function renderLeitner(){
  if(lt.cur.length===0){
    if(lt.dontknow.length===0||lt.round>=3){return leitnerResult();}
    lt.round++;lt.cur=shuffle(lt.dontknow);lt.dontknow=[];
  }
  const q=lt.cur[0];
  setProgress(lt.know.length,lt.total,'라이트너 3회독');
  $('counter').innerHTML=`<b>${lt.round}</b> 회독`;
  const front=dir==='w2m'?q.word:q.meaning;
  const back=dir==='w2m'?q.meaning:q.word;
  $('gameBody').innerHTML=`
    <div class="leitner-stats">
      <div class="box b-round"><b>${lt.round}</b>회독</div>
      <div class="box b-queue"><b>${lt.cur.length}</b>남음</div>
      <div class="box b-done"><b>${lt.know.length}</b>완료</div>
    </div>
    <div class="swipe-zone" style="height:240px">
      <div class="swipe-card" id="ltCard" style="cursor:pointer">
        <div class="flip-inner">
          <div class="flip-face front">
            <span class="src-tag">${q.source}</span>
            <div class="${dir==='w2m'?'word-big':'meaning-big'}">${front}</div>
            <span class="tap-mark">👆 눌러서 뒤집기</span>
          </div>
          <div class="flip-face back">
            <div class="${dir==='w2m'?'meaning-big':'word-big'}">${back}</div>
            <div class="sentence" style="margin-top:14px">${q.sentence}</div>
          </div>
        </div>
      </div>
    </div>
    <div class="swipe-hint">카드를 눌러 뜻 확인</div>
    <div class="swipe-btns">
      <button class="bL" onclick="leitnerMark(false)">✗ 모름</button>
      <button class="bR" onclick="leitnerMark(true)">✓ 알아!</button>
    </div>`;
  $('ltCard').addEventListener('click',function(){this.classList.toggle('flipped');playFlipSound();});
}
function leitnerMark(known){
  flashJudgeOnly(known);
  const q=lt.cur.shift();
  if(known)lt.know.push(q);else lt.dontknow.push(q);
  renderLeitner();
}
function leitnerResult(){
  setProgress(lt.total,lt.total,'라이트너 3회독');
  $('counter').innerHTML='';$('feedback').textContent='';
  const mastered=lt.know.length;const left=lt.dontknow.length;

  // ★ 학습기록 전송 (모름 단어 목록 전달)
  saveStudyRecord({
    scoreVal: mastered,
    totalVal: lt.total,
    wrongWords: lt.dontknow,
    extraNote: `${lt.round}회독완료`
  });
  $('gameBody').innerHTML=`
    <div class="card result-card">
      <div class="result-score">${mastered}<span style="font-size:24px;color:var(--meok-soft)"> / ${lt.total}</span></div>
      <div class="result-label">${lt.round}회독 완료 · 익힌 어휘</div>
      <div class="result-msg">${left===0?'전부 익혔습니다! 타임어택으로 점검해 보세요.':left+'개가 아직 헷갈립니다. 한 번 더!'}</div>
      <button class="action-btn" onclick="startMode('leitner')">다시 도전</button>
      <button class="action-btn ghost" onclick="goHome()">모드 선택으로</button>
    </div>`;
}

/* ============================================================
   ③ 타임어택 — 전체 어휘, 우→좌 소진 바
   ============================================================ */
let timer=null, timeLeft=0;
function clearTimer(){if(timer){clearInterval(timer);timer=null;}}
function startTime(){renderTime();}
function renderTime(){
  if(idx>=queue.length)return renderResult();
  clearTimer();answered=false;
  setProgress(idx,queue.length,'타임어택');
  $('counter').innerHTML=`<b>${idx+1}</b> / ${queue.length}`;
  const q=queue[idx];
  const qFace=dir==='w2m'?q.word:q.meaning;
  const key=dir==='w2m'?'meaning':'word';
  const opts=distractors(q,key);
  $('gameBody').innerHTML=`
    <div class="time-num" id="timeNum">${TIME_LIMIT.toFixed(1)}초</div>
    <div class="time-bar-wrap"><div class="time-bar" id="timeBar"></div></div>
    <div class="card">
      <span class="src-tag">${q.source}</span>
      <div class="${dir==='w2m'?'word-big':'meaning-big'}" style="text-align:center">${qFace}</div>
      <div class="options" id="opts">
        ${opts.map(o=>`<button class="opt" onclick="ansTime(this,'${esc(o)}','${esc(q[key])}')">${o}</button>`).join('')}
      </div>
    </div>`;
  const bar=$('timeBar');
  bar.style.transition='none';bar.style.transform='scaleX(1)';
  void bar.offsetWidth;
  bar.style.transition=`transform ${TIME_LIMIT}s linear`;
  bar.style.transform='scaleX(0)';
  timeLeft=TIME_LIMIT;
  timer=setInterval(()=>{
    timeLeft-=0.1;const num=$('timeNum');if(!num){clearTimer();return;}
    num.textContent=Math.max(0,timeLeft).toFixed(1)+'초';
    if(timeLeft<=0){clearTimer();timeUp();}
  },100);
}
function ansTime(btn,chosen,correct){
  if(answered)return;answered=true;clearTimer();
  const right=chosen===correct;
  document.querySelectorAll('#opts .opt').forEach(b=>{b.disabled=true;
    if(b.textContent===correct)b.classList.add('correct');else if(b===btn)b.classList.add('wrong');});
  feedback(right);if(right)score++;else wrongs.push(queue[idx]);
  setTimeout(()=>{idx++;renderTime();},right?600:1300);
}
function timeUp(){
  if(answered)return;answered=true;
  document.querySelectorAll('#opts .opt').forEach(b=>{b.disabled=true;});
  $('feedback').className='feedback wrongf';$('feedback').textContent='시간 초과 ✗';
  wrongs.push(queue[idx]);
  setTimeout(()=>{idx++;renderTime();},1200);
}

/* ============================================================
   ⑦ 카드 맞추기 — 큰 카드, 전체 어휘를 라운드로 분할
   ============================================================ */
let matchSel=null, matchDone=0, matchRounds=[], matchRoundIdx=0, matchTotalDone=0;
let matchRotation=1; // 회독 카운터 (전체 순환 1회 = 1회독)
function startMatch(){
  const pool=shuffle(VOCAB);
  matchRounds=[];
  for(let i=0;i<pool.length;i+=MATCH_CHUNK)matchRounds.push(pool.slice(i,i+MATCH_CHUNK));
  matchRoundIdx=0;matchTotalDone=0;matchRotation=1;
  renderMatchRound();
}
function renderMatchRound(){
  if(matchRoundIdx>=matchRounds.length)return matchAllDone();
  queue=matchRounds[matchRoundIdx];matchSel=null;matchDone=0;
  setProgress(matchTotalDone,VOCAB.length,'카드 맞추기');
  $('counter').innerHTML=`<b>${matchRotation}회독</b> · ${matchRoundIdx+1}/${matchRounds.length}라운드`;
  const words=shuffle(queue.map((q,i)=>({t:q.word,k:i,type:'w'})));
  const means=shuffle(queue.map((q,i)=>({t:q.meaning,k:i,type:'m'})));
  const tiles=[];for(let i=0;i<queue.length;i++){tiles.push(words[i]);tiles.push(means[i]);}
  $('gameBody').innerHTML=`
    <div class="match-board">
      <div class="match-round-note">어휘와 뜻을 번갈아 눌러 짝을 맞추세요 (${queue.length}쌍)</div>
      <div class="match-grid" id="matchGrid">
        ${tiles.map(x=>`<button class="match-tile" data-key="${x.k}" data-type="${x.type}" onclick="pickTile(this)">${x.t}</button>`).join('')}
      </div>
    </div>`;
}
function pickTile(el){
  if(el.classList.contains('done'))return;
  if(matchSel===null){matchSel=el;el.classList.add('sel');return;}
  if(matchSel===el){el.classList.remove('sel');matchSel=null;return;}
  const sameKey=matchSel.dataset.key===el.dataset.key, diffType=matchSel.dataset.type!==el.dataset.type;
  if(sameKey&&diffType){
    matchSel.classList.add('done');el.classList.add('done');matchSel.classList.remove('sel');matchSel=null;
    matchDone++;matchTotalDone++;
    flashJudgeOnly(true);
    setProgress(matchTotalDone,VOCAB.length,'카드 맞추기');
    if(matchDone===queue.length){
      $('feedback').className='feedback right';$('feedback').textContent='이 라운드 완료!';
      setTimeout(()=>{matchRoundIdx++;$('feedback').textContent='';renderMatchRound();},800);
    }
  }else{
    const a=matchSel,b=el;a.classList.add('flash-wrong');b.classList.add('flash-wrong');
    flashJudgeOnly(false);
    setTimeout(()=>{a.classList.remove('flash-wrong','sel');b.classList.remove('flash-wrong')},350);matchSel=null;
  }
}
function flashJudgeOnly(right){
  const badge=$('judgeBadge');badge.textContent=right?'✓':'✗';
  badge.className='judge-badge show '+(right?'ok':'no');
  const border=$('flashBorder');border.className='flash-border '+(right?'ok':'no');
  setTimeout(()=>{badge.classList.remove('show');border.className='flash-border';},right?450:600);
}
function matchAllDone(){
  // ★ 학습기록 전송
  saveStudyRecord({scoreVal: VOCAB.length, totalVal: VOCAB.length, wrongWords:[], extraNote:`${matchRotation}회독완료`});
  matchRotation++;
  // 회독 완료 알림 후 새 회독 자동 시작
  $('feedback').className='feedback right';
  $('feedback').textContent=`${matchRotation-1}회독 완료! 잠시 후 ${matchRotation}회독을 시작합니다.`;
  setProgress(0,VOCAB.length,'카드 맞추기');
  setTimeout(()=>{
    $('feedback').textContent='';
    const pool=shuffle(VOCAB);
    matchRounds=[];
    for(let i=0;i<pool.length;i+=MATCH_CHUNK)matchRounds.push(pool.slice(i,i+MATCH_CHUNK));
    matchRoundIdx=0;matchTotalDone=0;
    renderMatchRound();
  },1800);
}
function _matchResultScreen(){
  setProgress(VOCAB.length,VOCAB.length,'카드 맞추기');
  $('counter').innerHTML='';$('feedback').textContent='';
  $('gameBody').innerHTML=`
    <div class="card result-card">
      <div class="result-score">${VOCAB.length}<span style="font-size:24px;color:var(--meok-soft)"> / ${VOCAB.length}</span></div>
      <div class="result-label">전체 어휘 짝 맞추기 완료</div>
      <div class="result-msg">모든 어휘를 다 맞췄습니다!</div>
      <button class="action-btn" onclick="startMode('match')">다시 도전</button>
      <button class="action-btn ghost" onclick="goHome()">모드 선택으로</button>
    </div>`;
}

/* ============================================================
   🚀 블래스트 — 떠다니는 소행성 중 정답 격파, 전체 어휘 순환
   ============================================================ */
let blast={pool:[],target:null,bubbles:[],score:0,time:60,raf:null,timer:null,W:0,H:0};
function startBlastIntro(){
  setProgress(0,0,'블래스트');$('counter').innerHTML='';
  $('gameBody').innerHTML=`
    <div class="card blast-start">
      <h3>🚀 블래스트</h3>
      <p>화면 위쪽에 제시된 뜻(또는 어휘)에 맞는 소행성을 클릭해 격파하세요.<br>
      틀리면 감점 없이 다음 문제로, 전체 어휘를 계속 순환하며 출제됩니다.<br>제한시간 60초.</p>
      <button class="action-btn" onclick="startBlastGame()">게임 시작</button>
    </div>`;
}
function startBlastGame(){
  blast.pool=shuffle(VOCAB);blast.score=0;blast.time=60;blast.bubbles=[];
  $('gameBody').innerHTML=`
    <div class="blast-board" id="blastBoard">
      <div class="blast-stars"></div>
      <div class="blast-hud"><span>⭐ <span class="score" id="bScore">0</span>점</span><span class="time" id="bTime">60초</span></div>
      <div class="blast-target" id="bTarget"></div>
    </div>`;
  const board=$('blastBoard');blast.W=board.clientWidth;blast.H=board.clientHeight;
  spawnBatch();
  blast.timer=setInterval(()=>{
    blast.time--;$('bTime').textContent=blast.time+'초';
    if(blast.time<=0){clearInterval(blast.timer);cancelAnimationFrame(blast.raf);blastResult();}
  },1000);
  blast.raf=requestAnimationFrame(blastLoop);
}
function nextWord(){
  if(blast.pool.length===0)blast.pool=shuffle(VOCAB);
  return blast.pool.shift();
}
function spawnBatch(){
  blast.target=nextWord();
  const askWord = dir==='w2m' ? false : true; // w2m: 뜻 보여주고 어휘 격파 / m2w: 어휘 보여주고 뜻 격파
  $('bTarget').textContent = askWord ? blast.target.word : blast.target.meaning;
  const key = askWord ? 'meaning' : 'word';
  const correctVal = blast.target[key];
  const distractVals = distractors(blast.target,key,5).filter(v=>v!==correctVal).slice(0,5);
  const vals=shuffle([correctVal,...distractVals]);
  const board=$('blastBoard');if(!board)return;
  document.querySelectorAll('.blast-bubble').forEach(b=>b.remove());
  blast.bubbles=vals.map((v,i)=>{
    const size=64+Math.random()*26;
    const el=document.createElement('div');
    el.className='blast-bubble';el.style.width=size+'px';el.style.height=size+'px';
    el.textContent=v;
    el.onclick=()=>blastClick(el,v===correctVal);
    board.appendChild(el);
    return {el,x:Math.random()*(blast.W-size),y:130+Math.random()*(blast.H-size-150),
      vx:(Math.random()-.5)*1.0,vy:(Math.random()-.5)*1.0,size};
  });
}
function blastLoop(){
  blast.bubbles.forEach(b=>{
    b.x+=b.vx;b.y+=b.vy;
    if(b.x<0||b.x>blast.W-b.size)b.vx*=-1;
    if(b.y<125||b.y>blast.H-b.size-5)b.vy*=-1;
    b.el.style.transform=`translate(${b.x}px,${b.y}px)`;
  });
  blast.raf=requestAnimationFrame(blastLoop);
}
function blastClick(el,right){
  if(el.classList.contains('pop')||el.classList.contains('miss'))return;
  if(right){
    blast.score++;$('bScore').textContent=blast.score;
    el.classList.add('pop');
    flashJudgeOnly(true);
    setTimeout(spawnBatch,260);
  }else{
    el.classList.add('miss');
    flashJudgeOnly(false);
    setTimeout(()=>el.classList.remove('miss'),350);
  }
}
function blastResult(){
  setProgress(0,0,'블래스트');$('counter').innerHTML='';$('feedback').textContent='';
  document.querySelectorAll('.blast-bubble').forEach(b=>b.remove());

  // ★ 학습기록 전송 (블래스트는 60초 내 격파 점수 기록)
  saveStudyRecord({scoreVal: blast.score, totalVal: blast.score, wrongWords:[], extraNote:'60초챌린지'});
  $('gameBody').innerHTML=`
    <div class="card result-card">
      <div class="result-score">${blast.score}<span style="font-size:20px;color:var(--meok-soft)">점</span></div>
      <div class="result-label">60초 동안 격파한 소행성 수</div>
      <div class="result-msg">${blast.score>=15?'대단한 순발력입니다!':blast.score>=8?'좋아요, 조금만 더!':'천천히 반복하면 빨라집니다.'}</div>
      <button class="action-btn" onclick="startMode('blast')">다시 도전</button>
      <button class="action-btn ghost" onclick="goHome()">모드 선택으로</button>
    </div>`;
}


/* 공통 */
function feedback(right){
  const f=$('feedback');f.className='feedback '+(right?'right':'wrongf');
  f.textContent=right?'맞았습니다 ✓':'다시 새겨 둡시다 ✗';
  const badge=$('judgeBadge');badge.textContent=right?'✓':'✗';
  badge.className='judge-badge show '+(right?'ok':'no');
  const border=$('flashBorder');border.className='flash-border '+(right?'ok':'no');
  setTimeout(()=>{badge.classList.remove('show');border.className='flash-border';},right?550:900);
  if(right) playCorrectSound(); else playWrongSound();
}
function next(){idx++;renderQ();}

function renderResult(){
  clearTimer();
  const total=queue.length;
  setProgress(total,total,modeLabel());
  const pct=Math.round(score/total*100);

  // ★ 학습기록 전송
  saveStudyRecord({scoreVal:score, totalVal:total, wrongWords:wrongs});

  let msg;
  if(pct===100)msg='완벽합니다. 다음 갈래로 넘어가도 좋아요.';
  else if(pct>=70)msg='잘했어요. 틀린 어휘만 다시 인출해 봅시다.';
  else if(pct>=40)msg='절반의 고비. 원문 문장과 함께 한 번 더.';
  else msg='괜찮아요. 플래시카드로 다시 익히고 도전!';
  $('counter').innerHTML='';$('feedback').textContent='';
  const wrongHtml=wrongs.length?`
    <div class="wrong-list">
      <h4>📌 다시 볼 어휘 (${wrongs.length})</h4>
      ${wrongs.map(w=>`<div class="wi"><b>${w.word}</b> — ${w.meaning}</div>`).join('')}
    </div>`:'';
  $('gameBody').innerHTML=`
    <div class="card result-card">
      <div class="result-score">${score}<span style="font-size:24px;color:var(--meok-soft)"> / ${total}</span></div>
      <div class="result-label">정답률 ${pct}%</div>
      <div class="result-msg">${msg}</div>
      ${wrongHtml}
      <button class="action-btn" onclick="startMode('${mode}')">다시 도전</button>
      <button class="action-btn ghost" onclick="goHome()">모드 선택으로</button>
    </div>`;
}

/* ============================================================
   뒤집기 소리 — Web Audio API (라이브러리 없이 순수 생성)
   ============================================================ */
let _audioCtx = null;
function getAudioCtx(){
  if(!_audioCtx) _audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return _audioCtx;
}
function playFlipSound(){
  try{
    const ctx = getAudioCtx();
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.08, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0;i<data.length;i++){
      const t = i/ctx.sampleRate;
      data[i] = Math.sin(2*Math.PI*800*t) * Math.exp(-30*t) * 0.35;
    }
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start();
  }catch(e){}
}
function playCorrectSound(){
  try{
    const ctx = getAudioCtx();
    [523,659,784].forEach((freq,i)=>{
      const osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.frequency.value=freq; osc.type='sine';
      gain.gain.setValueAtTime(0.2,ctx.currentTime+i*0.1);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.1+0.18);
      osc.connect(gain);gain.connect(ctx.destination);
      osc.start(ctx.currentTime+i*0.1);osc.stop(ctx.currentTime+i*0.1+0.18);
    });
  }catch(e){}
}
function playWrongSound(){
  try{
    const ctx = getAudioCtx();
    const osc=ctx.createOscillator(), gain=ctx.createGain();
    osc.frequency.value=220; osc.type='sawtooth';
    gain.gain.setValueAtTime(0.15,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.25);
    osc.connect(gain);gain.connect(ctx.destination);
    osc.start();osc.stop(ctx.currentTime+0.25);
  }catch(e){}
}

/* ============================================================
   학습기록 — localStorage 저장 (기기 내 즉시 확인)
   + Apps Script 연동 시 구글시트에도 동시 전송
   ============================================================ */
const LS_KEY = 'eden_records';

function getLocalRecords(){
  try{ return JSON.parse(localStorage.getItem(LS_KEY)||'[]'); }catch(e){ return []; }
}
function saveLocalRecord(rec){
  const list = getLocalRecords();
  list.unshift(rec);          // 최신이 위로
  if(list.length > 500) list.pop();   // 최대 500건 유지
  try{ localStorage.setItem(LS_KEY, JSON.stringify(list)); }catch(e){}
}
function clearRecords(){
  if(!confirm('이 기기의 학습기록을 모두 삭제하시겠습니까?')) return;
  localStorage.removeItem(LS_KEY);
  renderRecords();
}

/* 탭 전환 */
function switchTab(tab){
  const isStudy = tab==='study';
  document.getElementById('tabStudy').classList.toggle('on', isStudy);
  document.getElementById('tabRecord').classList.toggle('on', !isStudy);
  // 학습 관련 화면
  ['subjectSel','unitSel','home','game'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.style.display = isStudy ? '' : 'none';
  });
  // footer
  const ft = document.querySelector('footer');
  if(ft) ft.style.display = isStudy ? '' : 'none';
  // 기록 화면
  const rec = document.getElementById('recScreen');
  if(rec){ rec.classList.toggle('active', !isStudy); }
  if(!isStudy) renderRecords();
}

/* 기록 렌더링 */
let recFilterSubject = 'all';
function renderRecords(){
  const all = getLocalRecords().filter(r => !currentUser || r.name === currentUser);
  const $sum = document.getElementById('recSummary');
  const $tabs = document.getElementById('recTabs');
  const $list = document.getElementById('recList');
  if(!$sum) return;

  if(all.length === 0){
    $sum.innerHTML='';
    $tabs.innerHTML='';
    $list.innerHTML='<div class="rec-empty">📭 아직 학습기록이 없습니다.<br>학습을 완료하면 여기에 기록됩니다.</div>';
    return;
  }

  // 요약 통계
  const totalSec = all.reduce((s,r)=>s+(r.elapsed||0),0);
  const avgPct   = Math.round(all.reduce((s,r)=>s+(r.total>0?r.score/r.total*100:0),0)/all.length);
  const subjects  = [...new Set(all.map(r=>r.subject))];
  const modes     = [...new Set(all.map(r=>r.mode))];
  const lastDate  = all[0]?.time?.slice(0,10)||'-';
  $sum.innerHTML = `
    <div class="rec-stat"><b>${all.length}</b><span>총 세션</span></div>
    <div class="rec-stat"><b>${Math.floor(totalSec/60)}</b><span>누적(분)</span></div>
    <div class="rec-stat"><b>${avgPct}%</b><span>평균 정답률</span></div>
    <div class="rec-stat"><b>${subjects.length}</b><span>학습 과목</span></div>
    <div class="rec-stat"><b>${lastDate}</b><span>최근 학습</span></div>
  `;

  // 과목 필터 탭
  const subjectList = ['전체', ...subjects];
  $tabs.innerHTML = subjectList.map(s=>`
    <button class="rec-tab ${(s==='전체'?recFilterSubject==='all':recFilterSubject===s)?'on':''}"
      onclick="filterRec('${s}')">${s}</button>
  `).join('');

  // 목록
  const filtered = recFilterSubject==='all' ? all : all.filter(r=>r.subject===recFilterSubject);
  $list.innerHTML = filtered.slice(0,80).map(r=>{
    const pct = r.total>0 ? Math.round(r.score/r.total*100) : '-';
    const scoreClass = typeof pct==='number' && pct<60 ? 'bad' : '';
    const wrongHtml = r.wrongs && r.wrongs.length
      ? `<div class="ri-wrongs">✗ 오답: ${r.wrongs.slice(0,8).join(' · ')}${r.wrongs.length>8?` 외 ${r.wrongs.length-8}개`:''}</div>` : '';
    return `<div class="rec-item">
      <div class="ri-top">${r.subject||''} · ${r.unit||''} · ${r.mode||''}</div>
      <div class="ri-score ${scoreClass}">${pct}%</div>
      <div class="ri-sub">${r.time||''} · ${Math.floor((r.elapsed||0)/60)}분 ${(r.elapsed||0)%60}초 · ${r.score}/${r.total}</div>
      ${wrongHtml}
    </div>`;
  }).join('');
}
function filterRec(s){
  recFilterSubject = s==='전체' ? 'all' : s;
  renderRecords();
}
